services:
  gateway:
    build: ./gateway
    ports:
      - "8000:8000"
    volumes:
      - ./gateway/classic-webpage-auth.json:/app/classic-webpage-auth.json:ro
    environment:
      PORT: "8000"
      ENV: development
      WEBPAGE_URL: ${WEBPAGE_URL}
      PARSER_URL: ${PARSER_URL}
      GOOGLE_APPLICATION_CREDENTIALS: /app/classic-webpage-auth.json

  parser:
    build: ./parser
    env_file:
      - ./parser/.env
    environment:
      CACHE_PATH: /app/data/cache.db
    volumes:
      - parser-cache:/app/data

  webpage:
    build:
      context: ./webpage
      args:
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID}
        NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID}
        NEXT_PUBLIC_API_GATEWAY_URL: ${GATEWAY_URL}
    ports:
      - "3000:3000"
    environment:
      # GATEWAY_URL is baked into the client bundle at build time (browser → gateway).
      # GATEWAY_INTERNAL_URL is used at runtime for SSR fetches inside Docker.
      API_GATEWAY_URL: ${GATEWAY_INTERNAL_URL}
    depends_on:
      - gateway

volumes:
  parser-cache:
