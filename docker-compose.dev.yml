# Development overrides — merge on top of docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# Key difference from prod: the parser container needs to reach Ollama running
# on the host machine. host.docker.internal resolves to the host on Docker
# Desktop (Windows/Mac). The extra_hosts entry adds it on Linux Docker.

services:
  parser:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
